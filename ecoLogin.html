<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | EcoData</title>
  <link rel="stylesheet" href="globalStyle.css">
  <link rel="stylesheet" href="signUpStyle.css">




  <style>
    


  .btn-text{
    font-size: .95rem;
    font-weight: 600;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  }


  .spinner{
    width: 19px;
    height: 19px;
    border: 3px solid white;
    border-top: 3px solid transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    display: none;
  }

  button.loading .spinner{
    display: block;
  }

  button.loading .btn-text{
    display: none;
  }


  @keyframes spin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }



  </style>
</head>
<body>

  <!-----NAVIGATION- BAR-->
  
<nav class="navbar">
<div class="nav-left">
<img onclick="window.location.href = 'welcomingPage.html'" src="./uiIcons/back.png" alt="" loading="lazy">
</div>
<div class="nav-right">
 <h3>Login</h3>
</div>

</nav>


<section class="top-bg">
  <div class="hero-logo">
    <img src="./icons/logoImg.png" alt="" loading="lazy">
  </div>
</section>


  <div class="container">
    <h2>Welcome Back! <br> Please Login to Your Account</h2>



    <form id="login-form">

     <div class="formFillCard">
  <div class="formFillCard-top">
    <label> Email Address</label>
  </div>
  <div class="formFillCard-bottom">
    <div class="formInputCreate">
      <img class="curNone" src="./uiIcons/email.png" alt="">
        <input type="email" id="email" placeholder="Email"  />
    </div>
 
  </div>
     </div>





  <div class="formFillCard">
  <div class="formFillCard-top">
    <label>Password</label>
  </div>
  <div class="formFillCard-bottom">
    <div class="formInputCreate">
      <img class="curNone" src="./uiIcons/lock.png" alt="" loading="lazy">
      <input  type="password" id="password" placeholder="Choose Password"  />
      <img id="togglePassword" class="curYes" src="./uiIcons/eye.png" alt="toggle password">
    </div>
     
  </div>
</div>
    
<div class="already">
 <p> Don't have an account? <button type="button" class="alloginBtn" onclick="window.location.href = 'ecoSignUp.html'" >Sign Up</button></p>
</div>
   

      <button class="signUpBtn" id="logBtn" type="submit">
        <span class="spinner"></span>
        <span class="btn-text">Login</span>
      </button>


    </form>



   
  </div>

 <section class="foot">
   <div class="foot-content">
    <div class="cop-right">
 © 2026 EcoShop. All rights reserved.
     
    </div>
   <small class="bor
   ">|</small>
      <small class="powered">
        
      <strong>Powered by:</strong>   IA E-Business 
    </small>
  
   </div>

  </section>

<!----SNACKBAR-SECTION----->
  








<script type="module" src="ecoLogin.js">

</script>


<script>

  document.addEventListener("DOMContentLoaded", () => {

  const password = document.getElementById("password");
  const togglePassword = document.getElementById("togglePassword");

  togglePassword.addEventListener("click", () => {
    const isPassword = password.type === "password";

    // Toggle input type
    password.type = isPassword ? "text" : "password";

    // Toggle icon image
    togglePassword.src = isPassword 
      ? "./uiIcons/hide.png" 
      : "./uiIcons/eye.png";
  });
  });
</script>



</body>
</html>
