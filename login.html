<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | EcoData</title>
  <link rel="stylesheet" href="styleGlobal.css">
  <style>

    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      list-style: none;
      text-decoration: none;
    }

    

:root {
  --bg-cl: #FFF;
  --primary-cl: #fff;
  --secondary-cl: rgb(50, 50, 190);
  --dark-cl: #0a0a0a;
  --ascent-cl: rgb(158, 97, 209);
  --background-cl: #e6e8ce;
  --card-full-bg-cl: rgb(255, 217, 0);
  --card-full-tele-bg-cl: rgb(221, 19, 19);
  --card-full-airtel-bg-cl:  rgb(6, 6, 231);
  --border-cl-2: rgba(66, 66, 26, 0.226);
  --mtn-btn: rgb(193, 196, 19);
  --telecel-btn: rgb(180, 57, 19);
  --airteltigo-btn: rgb(28, 46, 119);
}



    body {
      font-family: Arial, sans-serif;
      background: url(./css/images/bg.jpg);
      background-position: center;
      background-size: cover;
      background-attachment: fixed;
      background-repeat: no-repeat;
      width: 100%;
      margin: 0;
      justify-self: center;
      padding: 0;
      height: max-content;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /**
* NAVIGATION BAR
**/
.navbar {
  display: flex;
  width: 100%;
  max-width: 480px;
  justify-self: center;
  height: 3rem;
  position: fixed;
  top: 0;
  overflow: hidden;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-cl);
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  padding: .5rem 1.2rem;
  z-index: 1000;

}

/**
* NAV LEFT
**/
.navbar .nav-left{
  display: flex;
  align-items: center;
  justify-content: center;
}


.nav-left img{
  width: 2.4rem;
  height: 2.4rem;
  background-color: none;
  border-radius: 50%;
  box-shadow: 0 4px 10px rgba(255, 255, 255, 0.3);
  cursor: pointer;
}


/**
* NAV-RIGHT
**/
.nav-right{
  display: flex;
  width: 6rem;
  height: 100%;
  align-items: center;
  justify-content: center;
  background: transparent;
  border-radius: 4px;
  margin-right: 0.5rem;
  padding: 0 .2rem;
}

.nav-right img{
  width: 2.2rem;
  height: 2.2rem;
  cursor: pointer;
}

.login {
  display: flex;
  align-items: center;
  width: max-content;
  justify-content: space-between;
}

.login a{
  text-align: center;
  text-decoration: none;
  list-style: none;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 .8rem;
  color: var(--card-full-bg-cl);
}


.login img {
  width: 1.4rem;
  height: 1.4rem;
  margin: 0 .5rem;
  background: var(--background-cl);
  border-radius: 50%;
  cursor: pointer;
}

.menu-icon{
  background: rgba(219, 214, 214, 0.37);
  border-radius: 4px;
  padding: .3px;
  margin-right: 1rem;
}






    .container {
      background: transparent;
      border: 0.1px solid var(--background-cl);
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 2px 10px rgba(88, 87, 87, 0.3);
      width: 100%;
      height: 30rem;
      gap: 2rem;
      max-width: 370px;
      margin-top: 7rem;
      margin-bottom: 6rem;
      display: flex;
      position: relative;
      justify-self: center;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      max-width: 300px;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    form{
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      height: 90%;
      justify-self: center;
      gap: 1.4rem
    }
    h2 {
      text-align: center;
      color: #41504e;
      font-weight: 700;
      white-space: nowrap;
      font-size: 1rem;
    }
    input {
      width: 100%;
      padding: 16px 18px;
      margin-top: 30px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
      height: 2.4rem;
      text-align: start;
      background-color: white;
    }

    input::placeholder{
      opacity: .5;
      font-size: .8rem;
    }



  .btn-text{
    font-size: .95rem;
    font-weight: 600;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  }


  .spinner{
    width: 19px;
    height: 19px;
    border: 3px solid white;
    border-top: 3px solid transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    display: none;
  }

  button.loading .spinner{
    display: block;
  }

  button.loading .btn-text{
    display: none;
  }


  @keyframes spin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }






    button {
      position: relative;
      display: flex;
      white-space: nowrap;
      align-items: center;
      gap: .5rem;
      justify-content: center;
      width: 70%;
      padding: 10px;
      background: #2196f3;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 14px;
      margin-top: 25px;
      cursor: pointer;
    }

    button:hover {
      background: #1976d2;
    }
    
    p {
      text-align: center;
      margin-top: 1rem;
      background: rgba(0, 0, 0, 0.582);
      padding: .2em;
      border-radius: 3px;
      color: rgb(235, 237, 238);
      font-size: .9rem;
    }
    a {
      color: #2fd119;
      text-decoration: none;
      padding: .3rem;
      border-radius: 4px;
      font-size: .8rem;
      margin: 0 -0.1rem;
    }








@media (min-width: 1440px) {
  .navbar{
    width: 100vw;
    max-width: 100%;
    padding: .5rem 1rem;
  }
}

@media (min-width: 1200px) {
  .navbar{
    width: 100vw;
    max-width: 100%;
    padding: .5rem 1rem;
  }
}

@media (min-width: 800px) {
  .navbar{
    width: 100vw;
    max-width: 100%;
    padding: .5rem 1rem;
  }
}

  </style>
</head>
<body>

  <!-----NAVIGATION- BAR-->
  
<nav class="navbar">
<div class="nav-left">
 <a href="index.html">
  <img src="./css/icons/icon-shortcut.png" alt="image" loading="lazy"></a>
</div>


</nav>

  <div class="container">
    <h2>Welcome Back! <br> Please Login to Your Account</h2>
    <form id="login-form">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
    
      <button id="logBtn" type="submit">
        <span class="spinner"></span>
        <span class="btn-text">Login</span>
      </button>
    </form>
    <p>Don’t have an account? <a href="signUp.html">Sign Up</a></p>
  </div>

 
<!----SNACKBAR-SECTION----->
  








<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";


// 🔹 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyClNBlfigtQk8AZWdMZcU9sEtVcIrS0D1g",
  authDomain: "ecodata-2bee6.firebaseapp.com",
  projectId: "ecodata-2bee6",
  storageBucket: "ecodata-2bee6.firebasestorage.app",
  messagingSenderId: "544837123249",
  appId: "1:544837123249:web:6c362350a00c6dab10b690"
};


// 🔹 Initialize
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// 🔹 Display username when logged in
onAuthStateChanged(auth, async (user) => {

  const usernameDisplay = document.getElementById("usernameDisplay");
  if (!usernameDisplay) return;

  if (user) {

    const userDoc = await getDoc(doc(db, "users", user.uid));

    if (userDoc.exists()) {
      const userData = userDoc.data();
      usernameDisplay.textContent = `Welcome, ${userData.username}!`;
    } else {
      usernameDisplay.textContent = "Welcome!";
    }

  } else {
    usernameDisplay.textContent = "Welcome, Guest!";
  }

});


// 🔹 Login
const loginForm = document.getElementById("login-form");
const logBtn = document.getElementById("logBtn");

loginForm.addEventListener("submit", async (e) => {

  e.preventDefault();
  logBtn.classList.add("loading");

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  try {

    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    const userDoc = await getDoc(doc(db, "users", user.uid));

    if (!userDoc.exists()) {
      showSnackBar("User profile not found.", "error");
      logBtn.classList.remove("loading");
      return;
    }

    const userData = userDoc.data();

    // Save locally
    localStorage.setItem("username", userData.username || "User");
    localStorage.setItem("role", userData.role || "user");

    showSnackBar("Login successful!", "success");

    // 🔥 Redirect based on role
    setTimeout(() => {

      if (userData.role === "agent") {
        window.location.href = "agentPage.html";
      } else {
        window.location.href = "index.html";
      }

    }, 3500);

  } catch (error) {

    showSnackBar(error.message, "error");

  }

  logBtn.classList.remove("loading");

});



/* ============================= */
/*        SNACKBAR SYSTEM        */
/* ============================= */

let snackbarTimeout = null;

function showSnackBar(message, type = "info", duration = 4000) {

  let snackbar = document.querySelector(".snackbar");

  if (!snackbar) {

    snackbar = document.createElement("div");
    snackbar.className = "snackbar";

    snackbar.innerHTML = `
      <span class="snackbar-text"></span>
      <div class="snackbar-progress"></div>
    `;

    document.body.appendChild(snackbar);

  }

  snackbar.querySelector(".snackbar-text").textContent = message;

  if (type === "success") snackbar.style.background = "rgba(7,29,26,0.95)";
  else if (type === "error") snackbar.style.background = "#dc3545";
  else if (type === "warning") snackbar.style.background = "#ffc107";
  else snackbar.style.background = "rgba(7,29,26,0.95)";

  const progress = snackbar.querySelector(".snackbar-progress");

  progress.style.animation = "none";
  void progress.offsetWidth;

  progress.style.animation = `snackbar-progress ${duration}ms linear forwards`;

  snackbar.classList.add("show");

  if (snackbarTimeout) clearTimeout(snackbarTimeout);

  snackbarTimeout = setTimeout(() => {
    snackbar.classList.remove("show");
  }, duration);

}

</script>






</body>
</html>
