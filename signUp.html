        /**
* NAVIGATION BAR
**/

  overflow: hidden;

}

* NAV LEFT

.menu-icon{

    .container {
      background: transparent;
      border: 0.1px solid var(--background-cl);
      padding: 4rem;
      border-radius: 14px;
      box-shadow: 0 2px 10px rgba(88, 87, 87, 0.3);

    }


    


  .btn-text{
    font-size: .95rem;
    font-weight: 600;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  }


  .spinner{
    width: 19px;
    height: 19px;
    border: 3px solid white;
    border-top: 3px solid transparent;
    border-radius: 50%;

    display: none;
  }

    display: block;
  }

  button.loading .btn-text{

  }


  @keyframes spin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }










    button {

<body>

  <!-----NAVIGATION BAR----->

  
<nav class="navbar">
<div class="nav-left">
 <a href="index.html">
  <img src="./css/icons/icon-shortcut.png" alt="image" loading="lazy"></a>

  <div class="container">
    <h2>Create New Account</h2>
    <form id="signup-form">
      <input type="text" id="username" placeholder="Username" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Choose Password" required />
      <button id="signBtn" type="submit">
        <span class="spinner"></span>
        <span class="btn-text">Sign Up</span>
      </button>
    </form>
    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>















<!-- Firebase Core -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";


// 🔹 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyClNBlfigtQk8AZWdMZcU9sEtVcIrS0D1g",
  authDomain: "ecodata-2bee6.firebaseapp.com",
  projectId: "ecodata-2bee6",
  storageBucket: "ecodata-2bee6.firebasestorage.app",
  messagingSenderId: "544837123249",
  appId: "1:544837123249:web:6c362350a00c6dab10b690"
};


// 🔹 Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// 🔹 Signup form
const signupForm = document.getElementById("signup-form");
const sinBtn = document.getElementById("signBtn");


signupForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  sinBtn.classList.add("loading");

  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !email || !password) {
    showSnackBar("Please fill all fields", "warning");
    sinBtn.classList.remove("loading");
    return;
  }

  try {

    // 🔹 Create user
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // 🔹 Save user profile to Firestore
    await setDoc(doc(db, "users", user.uid), {
      uid: user.uid,
      username: username,
      email: email,
      role: "user",          // later can become "agent"
      balance: 0,
      createdAt: serverTimestamp()
    });

    showSnackBar("Signup successful!", "success");

    setTimeout(() => {
      window.location.href = "index.html";
    }, 3500);

  } catch (error) {

    if(error.code === "auth/email-already-in-use"){
      showSnackBar("This email is already registered. Login instead", "error")
    } else{
      showSnackBar(error.message, "error");
    }
   
  }

  sinBtn.classList.remove("loading");

});



/* ============================= */
/*        SNACKBAR SYSTEM        */
/* ============================= */

let snackbarTimeout = null;

function showSnackBar(message, type = "info", duration = 4000) {

  let snackbar = document.querySelector(".snackbar");

  if (!snackbar) {

    snackbar = document.createElement("div");
    snackbar.className = "snackbar";

    snackbar.innerHTML = `
      <span class="snackbar-text"></span>
      <div class="snackbar-progress"></div>
    `;

    document.body.appendChild(snackbar);
  }

  snackbar.querySelector(".snackbar-text").textContent = message;

  // color types
  if (type === "success") snackbar.style.background = "rgba(7,29,26,0.95)";
  else if (type === "error") snackbar.style.background = "#dc3545";
  else if (type === "warning") snackbar.style.background = "#ffc107";
  else snackbar.style.background = "rgba(7,29,26,0.95)";

  const progress = snackbar.querySelector(".snackbar-progress");

  progress.style.animation = "none";
  void progress.offsetWidth;

  progress.style.animation = `snackbar-progress ${duration}ms linear forwards`;

  snackbar.classList.add("show");

  if (snackbarTimeout) clearTimeout(snackbarTimeout);

  snackbarTimeout = setTimeout(() => {
    snackbar.classList.remove("show");
  }, duration);

}

</script>
